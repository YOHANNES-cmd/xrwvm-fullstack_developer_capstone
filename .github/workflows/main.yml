name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Linter
      run: |
        # Recursively look for python files across the entire directory structure
        find . -name "*.py" -not -path "*/djangoenv/*" -not -path "*/.git/*" -exec flake8 --max-line-length=79 {} +
        echo "Linted all the python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install JSHint
      run: npm install jshint --global

    - name: Run Linter
      run: |
        # Recursively find and lint your database .js files wherever they sit
        find . -name "*.js" -not -path "*/node_modules/*" -not -path "*/.git/*" -exec jshint {} +
        echo "Linted all the js files successfully"
