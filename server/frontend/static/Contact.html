<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>

    <!-- Stylesheet link (adjust path if needed) -->
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f9;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #2c3e50;
            overflow: hidden;
            padding: 10px 20px;
        }

        .navbar a {
            float: left;
            color: white;
            text-decoration: none;
            padding: 12px 16px;
            font-size: 16px;
        }

        .navbar a:hover {
            background-color: #1abc9c;
            border-radius: 4px;
        }

        .active {
            background-color: #1abc9c;
            border-radius: 4px;
        }

        /* Content */
        .container {
            padding: 40px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        h1 {
            color: #2c3e50;
        }

        .info {
            margin-top: 15px;
            line-height: 1.8;
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="/home">Home</a>
        <a href="/about">About</a>
        <a class="active" href="/contact">Contact Us</a>
    </div>

    <!-- Page Content -->
    <div class="container">
        <div class="card">
            <h1>Contact Us</h1>

            <div class="info">
                <p><strong>Company:</strong> TechNova Solutions</p>
                <p><strong>Email:</strong> support@technova.com</p>
                <p><strong>Phone:</strong> +251 911 123 456</p>
                <p><strong>Address:</strong> Bole Road, Addis Ababa, Ethiopia</p>
                <p>
                    We are available Monday to Friday, 9:00 AM - 6:00 PM.
                    Feel free to reach out for any support or inquiries.
                </p>
            </div>
        </div>
    </div>

</body>
</html>
